    const container = document.getElementById('quiz-container');
    const buttons = document.querySelectorAll('.filter-btn');

    function renderCards(moduleFilter) {
        container.innerHTML = ''; // Bersihkan container
        let count = 0;

        dataSoal.forEach((item, index) => {
            if (moduleFilter === 0 || item.m === moduleFilter) {
                count++;
                const card = document.createElement('div');
                card.className = 'quiz-card';
                card.onclick = function() {
                    const answerDiv = this.querySelector('.answer');
                    if (answerDiv.classList.contains('show')) {
                        answerDiv.classList.remove('show');
                    } else {
                        answerDiv.classList.add('show');
                    }
                };

                card.innerHTML = `
                    <span class="module-badge">Modul ${item.m}</span>
                    <p class="question">${count}. ${item.q}</p>
                    <p class="hint">Klik untuk melihat jawaban...</p>
                    <div class="answer"><strong>Jawaban:</strong> ${item.a}</div>
                `;
                container.appendChild(card);
            }
        });
    }

    function filterBy(modulNum) {
        // Ganti status aktif tombol
        buttons.forEach((btn, index) => {
            if (index === modulNum) {
                btn.classList.add('active');
            } else {
                btn.classList.remove('active');
            }
        });
        
        // Tampilkan soal sesuai filter
        renderCards(modulNum);
    }

    // Tampilkan semua soal saat pertama kali dibuka
    renderCards(0);
</script>
